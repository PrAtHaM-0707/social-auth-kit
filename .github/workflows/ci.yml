name: CI Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install Dependencies
      run: npm install
      
    - name: Run Type Check
      run: npx tsc --skipLibCheck --target ES2022 --moduleResolution node --noEmit --allowJs --checkJs src/index.js src/middlewares.js src/middlewares/express.js src/utils/token.js src/google/verifyGoogleToken.js src/errors/AuthError.js src/SocialAuth.js

    - name: Run Tests
      run: npm test

    - name: Build Declarations
      run: npm run build:types
